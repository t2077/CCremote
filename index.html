<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --text: #e0e0e0;
      --text-dim: #555;
      --border: #333;
      --user-bg: #2a2a2a;
      --system-bg: #1a1a1a;
      --thinking-color: #666;
      --tool-color: #7a9ec9;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    #console {
      height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 8px 0;
    }

    .line {
      padding: 2px 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .line-info { color: var(--text-dim); }
    .line-user { background: var(--user-bg); }
    .line-assistant { }
    .line-system { color: var(--text-dim); font-size: 12px; }
    .line-thinking { color: var(--thinking-color); font-size: 11px; padding-left: 20px; }
    .line-tool-use { color: var(--tool-color); font-size: 12px; }
    .line-tool-use .tool-use { color: #e0c060; font-weight: bold; }
    .line-tool-use .tool-result { color: #60e090; font-weight: bold; }
    .line-tool-use .tool-error { color: #e06060; font-weight: bold; }
    .line-tool-result { display: none; }
    .line-error { display: none; }
    .line-tool-result { color: #666; font-size: 11px; padding-left: 20px; }
    .line-error { color: #e07070; }

    /* subagent 样式 */
    .subagent-parent {
      background: #1e1e1e;
      cursor: pointer;
      transition: background 0.15s;
    }
    .subagent-parent:hover {
      background: #252525;
    }
    .subagent-parent.expanded {
      background: #252525;
    }
    .subagent-child {
      padding-left: 24px;
      font-size: 12px;
    }

    /* markdown 样式 */
    .line-assistant b, .line-assistant strong { color: #fff; font-weight: bold; }
    .line-assistant i, .line-assistant em { color: #ccc; font-style: italic; }
    .line-assistant code { background: #333; padding: 1px 4px; border-radius: 2px; color: #7a9ec9; }
    .line-assistant pre { background: #1a1a1a; padding: 4px 8px; margin: 4px 0; border-radius: 2px; }
    .line-assistant pre code { background: none; padding: 0; }

    #console::-webkit-scrollbar { width: 6px; }
    #console::-webkit-scrollbar-track { background: var(--bg); }
    #console::-webkit-scrollbar-thumb { background: #333; }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }

    #send-btn {
      background: #2a2a2a;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
    }

    #send-btn:hover { background: #333; }
    #send-btn:active { background: #3a3a3a; }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44336;
      margin-right: 6px;
    }

    #header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }

    #selector {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a1a;
      border: 1px solid var(--border);
      padding: 16px 24px;
      min-width: 300px;
      max-width: 500px;
      z-index: 1000;
      display: none;
    }

    #selector.show {
      display: block;
    }

    #selector-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--text);
    }

    #selector-info {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .selector-option {
      padding: 8px 12px;
      margin: 4px 0;
      background: #252525;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }

    .selector-option:hover, .selector-option.selected {
      background: #333;
      border-color: #555;
    }

    /* 凭证对话框样式 */
    #config-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #config-modal.hidden {
      display: none;
    }

    #config-dialog {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 24px;
      width: 420px;
      max-width: 90%;
    }

    #config-dialog h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #fff;
    }

    #config-dialog p {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    #config-dialog label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    #config-dialog input {
      width: 100%;
      background: #111;
      border: 1px solid #444;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 12px;
      outline: none;
    }

    #config-dialog input:focus {
      border-color: #666;
    }

    #config-dialog button {
      width: 100%;
      background: #0066cc;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    #config-dialog button:hover {
      background: #0077dd;
    }

    .config-error {
      color: #e06060;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="config-modal">
    <div id="config-dialog">
      <h2>Supabase 配置</h2>
      <p>请输入你的 Supabase 项目配置信息（这些信息将保存在浏览器 Cookie 中）</p>

      <label for="supabase-url">Supabase URL</label>
      <input type="text" id="supabase-url" placeholder="https://xxxx.supabase.co">

      <label for="supabase-key">Publishable Key</label>
      <input type="text" id="supabase-key" placeholder="sb_publishable_xxx...">

      <label for="channel-name">频道名称（可选）</label>
      <input type="text" id="channel-name" placeholder="cc-bridge-channel">

      <div id="config-error" class="config-error"></div>

      <button onclick="saveConfig()">保存并连接</button>
    </div>
  </div>

  <div id="header">
    <span id="status-dot"></span>CC Bridge
  </div>

  <div id="console"></div>

  <div id="input-area">
    <input type="text" id="input-box" placeholder="输入指令...">
    <button id="send-btn">发送</button>
  </div>

  <div id="selector">
    <div id="selector-title">工具使用请求</div>
    <div id="selector-info"></div>
    <div id="selector-options"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="console.js"></script>
  <script>
    // ============== 凭证管理 ==============
    const COOKIE_NAME = 'cc_bridge_supabase';
    const COOKIE_MAX_AGE = 60 * 60 * 24 * 30; // 30天

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }

    function setCookie(name, value, maxAge) {
      document.cookie = `${name}=${value}; path=/; max-age=${maxAge}; SameSite=Strict`;
    }

    function deleteCookie(name) {
      document.cookie = `${name}=; path=/; max-age=0`;
    }

    function loadConfig() {
      const saved = getCookie(COOKIE_NAME);
      if (saved) {
        try {
          return JSON.parse(decodeURIComponent(saved));
        } catch (e) {
          return null;
        }
      }
      return null;
    }

    function saveConfig() {
      const url = document.getElementById('supabase-url').value.trim();
      const key = document.getElementById('supabase-key').value.trim();
      const channel = document.getElementById('channel-name').value.trim() || 'cc-bridge-channel';

      const errorEl = document.getElementById('config-error');

      if (!url) {
        errorEl.textContent = '请输入 Supabase URL';
        return;
      }
      if (!url.startsWith('https://')) {
        errorEl.textContent = 'Supabase URL 必须以 https:// 开头';
        return;
      }
      if (!key) {
        errorEl.textContent = '请输入 Publishable Key';
        return;
      }

      const config = { url, key, channel };
      setCookie(COOKIE_NAME, encodeURIComponent(JSON.stringify(config)), COOKIE_MAX_AGE);

      // 隐藏对话框
      document.getElementById('config-modal').classList.add('hidden');

      // 传递给 console.js
      window.supabaseConfig = config;
    }

    // 页面加载时检查凭证
    (function init() {
      // 检查是否需要清除 cookie
      if (new URLSearchParams(window.location.search).has('delete-cookie')) {
        deleteCookie(COOKIE_NAME);
        window.location.search = '';
      }

      const config = loadConfig();
      if (config && config.url && config.key) {
        // 有保存的凭证，直接使用
        document.getElementById('supabase-url').value = config.url;
        document.getElementById('supabase-key').value = config.key;
        document.getElementById('channel-name').value = config.channel || 'cc-bridge-channel';
        document.getElementById('config-modal').classList.add('hidden');
        window.supabaseConfig = config;
      } else {
        // 没有凭证，显示对话框
        document.getElementById('config-modal').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
