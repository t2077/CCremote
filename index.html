<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --text: #e0e0e0;
      --text-dim: #555;
      --border: #333;
      --user-bg: #2a2a2a;
      --system-bg: #1a1a1a;
      --thinking-color: #666;
      --tool-color: #7a9ec9;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    #console {
      height: calc(100dvh - 100px);
      overflow-y: auto;
      padding: 8px 0;
      margin-left: 2px;
    }

    .line {
      padding: 2px 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .line-info { color: var(--text-dim); }
    .line-user { background: var(--user-bg); }
    .line-assistant { }
    .line-system { color: var(--text-dim); font-size: 12px; }
    .line-thinking { color: var(--thinking-color); font-size: 11px; padding-left: 20px; }
    .line-tool-use { color: var(--tool-color); font-size: 12px; }
    .line-tool-use .tool-use { color: #e0c060; font-weight: bold; }
    .line-tool-use .tool-result { color: #60e090; font-weight: bold; }
    .line-tool-use .tool-error { color: #e06060; font-weight: bold; }
    .line-tool-result { display: none; }
    .line-error { display: none; }
    .line-tool-result { color: #666; font-size: 11px; padding-left: 20px; }
    .line-error { color: #e07070; }

    /* subagent 样式 */
    .subagent-parent {
      background: #1e1e1e;
      cursor: pointer;
      transition: background 0.15s;
    }
    .subagent-parent:hover {
      background: #252525;
    }
    .subagent-parent.expanded {
      background: #252525;
    }
    .subagent-child {
      padding-left: 24px;
      font-size: 12px;
    }

    /* markdown 样式 */
    .line-assistant b, .line-assistant strong { color: #fff; font-weight: bold; }
    .line-assistant i, .line-assistant em { color: #ccc; font-style: italic; }
    .line-assistant code { background: #333; padding: 1px 4px; border-radius: 2px; color: #7a9ec9; }
    .line-assistant pre { background: #1a1a1a; padding: 4px 8px; margin: 4px 0; border-radius: 2px; overflow-x: auto; }
    .line-assistant pre code { background: none; padding: 0; word-break: break-word; overflow-wrap: anywhere; }
    .line-assistant pre::-webkit-scrollbar { width: 6px; height: 6px; }
    .line-assistant pre::-webkit-scrollbar-track { background: var(--bg); }
    .line-assistant pre::-webkit-scrollbar-thumb { background: #333; }

    #console::-webkit-scrollbar { width: 6px; }
    #console::-webkit-scrollbar-track { background: var(--bg); }
    #console::-webkit-scrollbar-thumb { background: #333; }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      resize: none;
      max-height: 300px;
      line-height: 1.4;
    }

    #send-btn {
      background: #2a2a2a;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
    }

    #send-btn:hover { background: #333; }
    #send-btn:active { background: #3a3a3a; }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44336;
      margin-right: 6px;
    }

    #header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #auto-allow {
      color: #555;
      cursor: pointer;
      user-select: none;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
    }

    #auto-allow.active {
      background: #4caf50;
      color: #fff;
    }

    #notify {
      color: #4caf50;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
    }

    #notify.inactive {
      color: #555;
    }

    #notify.no-need {
      color: #fff;
    }

    #pause {
      color: #555;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
    }

    #pause:hover {
      color: #e94560;
    }

    #selector {
      position: fixed;
      top: 50%;
      margin-top: -40vh;
      left: 0;
      right: 0;
      margin-left: auto;
      margin-right: auto;
      width: max-content;
      min-width: 300px;
      max-width: calc(100vw - 40px);
      background: #1a1a1a;
      border: 1px solid var(--border);
      padding: 16px 24px;
      max-height: 80vh;
      overflow: auto;
      z-index: 1000;
      display: none;
    }

    #selector::-webkit-scrollbar { width: 6px; }
    #selector::-webkit-scrollbar-track { background: var(--bg); }
    #selector::-webkit-scrollbar-thumb { background: #333; }

    #selector.show {
      display: block;
    }

    #selector-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #selector-close {
      cursor: pointer;
      color: #888;
      font-size: 16px;
      padding: 0 4px;
    }

    #selector-close:hover {
      color: #e94560;
    }

    #selector-info {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .selector-option {
      padding: 8px 12px;
      margin: 4px 0;
      background: #252525;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }

    .selector-option:hover, .selector-option.selected {
      background: #333;
      border-color: #555;
    }

    /* 凭证对话框样式 */
    #config-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #config-modal.hidden {
      display: none;
    }

    #config-dialog {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 24px;
      width: 420px;
      max-width: 90%;
    }

    #config-dialog h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #fff;
    }

    #config-dialog p {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    #config-dialog label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    #config-dialog input {
      width: 100%;
      background: #111;
      border: 1px solid #444;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 12px;
      outline: none;
    }

    #config-dialog input:focus {
      border-color: #666;
    }

    #config-dialog button {
      width: 100%;
      background: #0066cc;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    #config-dialog button:hover {
      background: #0077dd;
    }

    .config-error {
      color: #e06060;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 8px;
    }

    .channel-badge {
      background: #333;
      color: #fff;
      padding: 2px 4px;
      font-size: 10px;
      display: none;
    }

    .channel-badge.show {
      display: inline;
    }

    #bridge-name {
      cursor: default;
    }

    #bridge-name.switchable {
      cursor: pointer;
    }

    #bridge-name.switchable:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="config-modal">
    <div id="config-dialog">
      <h2>连接配置</h2>
      <p>请输入连接配置信息（这些信息将保存在浏览器 localStorage 中）</p>

      <div style="margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #333;">
        <h3 style="font-size: 13px; color: #aaa; margin-bottom: 12px;">Supabase</h3>
        <label for="supabase-url">Supabase URL</label>
        <input type="text" id="supabase-url" placeholder="https://xxxx.supabase.co">

        <label for="supabase-key">Publishable Key</label>
        <input type="text" id="supabase-key" placeholder="sb_publishable_xxx...">

        <label for="channel-name">频道名称（可选）</label>
        <input type="text" id="channel-name" placeholder="cc-bridge-channel">
      </div>

      <div>
        <h3 style="font-size: 13px; color: #aaa; margin-bottom: 12px;">Cloudflare</h3>
        <label for="cf-ws-url">WebSocket URL</label>
        <input type="text" id="cf-ws-url" placeholder="wss://your-worker.workers.dev">
      </div>

      <div id="config-error" class="config-error"></div>

      <button onclick="saveConfig()">连接</button>
    </div>
  </div>

  <div id="header">
    <span id="status-dot"></span><span id="bridge-name">CC Bridge</span><span id="channel-badge" class="channel-badge"></span>
    <span id="auto-allow">自动同意</span>
    <span id="notify" class="inactive">通知</span>
    <span id="pause">暂停</span>
  </div>

  <div id="console"></div>

  <div id="input-area">
    <textarea id="input-box" rows="1" placeholder="输入指令..."></textarea>
    <button id="send-btn">发送</button>
  </div>

  <div id="selector">
    <div id="selector-title">工具使用请求<span id="selector-close">✕</span></div>
    <div id="selector-info"></div>
    <div id="selector-options"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="console.js"></script>
  <script>
    // ============== 凭证管理 ==============
    const LS_KEY_SUPA = 'cc_bridge_supabase';
    const LS_KEY_CF = 'cc_bridge_ws';
    const LS_KEY_CHANNEL = 'cc_bridge_current_channel';

    function loadSupabaseConfig() {
      try {
        const saved = localStorage.getItem(LS_KEY_SUPA);
        if (saved) {
          return JSON.parse(saved);
        }
      } catch (e) {}
      return null;
    }

    function loadCloudflareConfig() {
      try {
        const saved = localStorage.getItem(LS_KEY_CF);
        if (saved) {
          return JSON.parse(saved);
        }
      } catch (e) {}
      return null;
    }

    function getCurrentChannel() {
      try {
        return localStorage.getItem(LS_KEY_CHANNEL) || null;
      } catch (e) {}
      return null;
    }

    function setCurrentChannel(channel) {
      try {
        localStorage.setItem(LS_KEY_CHANNEL, channel);
      } catch (e) {
        console.error('[Config] 保存 currentChannel 失败:', e);
      }
    }

    function saveConfig() {
      const supaUrl = document.getElementById('supabase-url').value.trim();
      const supaKey = document.getElementById('supabase-key').value.trim();
      const supaChannel = document.getElementById('channel-name').value.trim() || 'cc-bridge-channel';
      const cfWsUrl = document.getElementById('cf-ws-url').value.trim();

      const errorEl = document.getElementById('config-error');

      // 检查至少有一个配置
      const hasSupa = supaUrl && supaKey;
      const hasCf = cfWsUrl;

      if (!hasSupa && !cfWsUrl) {
        errorEl.textContent = '请至少填写一个配置';
        return;
      }

      if (hasSupa) {
        if (!supaUrl.startsWith('https://')) {
          errorEl.textContent = 'Supabase URL 必须以 https:// 开头';
          return;
        }
        const supaConfig = { url: supaUrl, key: supaKey, channel: supaChannel };
        try {
          localStorage.setItem(LS_KEY_SUPA, JSON.stringify(supaConfig));
        } catch (e) {
          console.error('[Config] 保存 Supabase config 失败:', e);
        }
      }

      if (hasCf) {
        const cfConfig = { wsUrl: cfWsUrl };
        try {
          localStorage.setItem(LS_KEY_CF, JSON.stringify(cfConfig));
        } catch (e) {
          console.error('[Config] 保存 Cloudflare config 失败:', e);
        }
      }

      // 确定当前信道：优先使用刚填写的那个
      if (hasSupa && !hasCf) {
        setCurrentChannel('supa');
      } else if (hasCf && !hasSupa) {
        setCurrentChannel('cf');
      } else if (hasSupa && hasCf) {
        // 两者都有，保持当前信道不变（如果之前没有，则默认 supa）
        const current = getCurrentChannel();
        if (!current) {
          setCurrentChannel('supa');
        }
      }

      // 隐藏对话框
      document.getElementById('config-modal').classList.add('hidden');

      // 传递给 console.js
      applyConfig();
    }

    function applyConfig() {
      const currentChannel = getCurrentChannel();
      if (currentChannel === 'cf') {
        const cfConfig = loadCloudflareConfig();
        if (cfConfig) {
          window.currentChannel = 'cf';
          window.cloudflareConfig = cfConfig;
        }
      } else {
        const supaConfig = loadSupabaseConfig();
        if (supaConfig) {
          window.currentChannel = 'supa';
          window.supabaseConfig = supaConfig;
        }
      }
      updateChannelBadge();
    }

    function updateChannelBadge() {
      const supa = loadSupabaseConfig();
      const cf = loadCloudflareConfig();
      const badge = document.getElementById('channel-badge');
      const bridgeName = document.getElementById('bridge-name');
      const current = getCurrentChannel();

      if (supa && supa.url && supa.key && cf && cf.wsUrl) {
        // 两个配置都存在，显示 badge
        badge.textContent = current === 'cf' ? 'cf' : 'supa';
        badge.classList.add('show');
        bridgeName.classList.add('switchable');
      } else {
        badge.classList.remove('show');
        bridgeName.classList.remove('switchable');
      }
    }

    function switchChannel() {
      const supa = loadSupabaseConfig();
      const cf = loadCloudflareConfig();

      if (!supa || !supa.url || !supa.key || !cf || !cf.wsUrl) {
        return; // 两个配置不都存在，不允许切换
      }

      const current = getCurrentChannel();
      const newChannel = current === 'supa' ? 'cf' : 'supa';
      setCurrentChannel(newChannel);
      applyConfig();
      location.reload();
    }

    // 页面加载时检查凭证
    (function init() {
      // 检查是否需要清除配置
      if (new URLSearchParams(window.location.search).has('delete-cookie')) {
        try { localStorage.removeItem(LS_KEY_SUPA); } catch (e) {}
        try { localStorage.removeItem(LS_KEY_CF); } catch (e) {}
        try { localStorage.removeItem(LS_KEY_CHANNEL); } catch (e) {}
        try { alert('登录信息已清除'); } catch (e) {}
        window.location.search = '';
        return;
      }

      const supaConfig = loadSupabaseConfig();
      const cfConfig = loadCloudflareConfig();

      // 填充表单
      if (supaConfig) {
        document.getElementById('supabase-url').value = supaConfig.url || '';
        document.getElementById('supabase-key').value = supaConfig.key || '';
        document.getElementById('channel-name').value = supaConfig.channel || 'cc-bridge-channel';
      }
      if (cfConfig) {
        document.getElementById('cf-ws-url').value = cfConfig.wsUrl || '';
      }

      // 决定是否显示对话框
      const hasAnyConfig = (supaConfig && supaConfig.url && supaConfig.key) || (cfConfig && cfConfig.wsUrl);

      if (hasAnyConfig) {
        document.getElementById('config-modal').classList.add('hidden');
        applyConfig();
      } else {
        document.getElementById('config-modal').classList.remove('hidden');
      }

      // 双击切换信道
      document.getElementById('bridge-name').addEventListener('dblclick', switchChannel);
    })();
  </script>
</body>
</html>
